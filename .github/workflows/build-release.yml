name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, e.g. v0.1.4"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows zip
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check release tag
        if: github.event_name != 'workflow_dispatch'
        run: npm.cmd run check:release-tag

      - name: Check workflow dispatch release tag
        if: github.event_name == 'workflow_dispatch'
        run: npm.cmd run check:release-tag -- --tag="${{ inputs.release_tag }}"

      - name: Typecheck
        run: npm.cmd run typecheck

      - name: Check i18n
        run: npm.cmd run check:i18n

      - name: Test
        run: npm.cmd test

      - name: Audit
        run: npm.cmd run audit

      - name: Build
        run: npm.cmd run build

      - name: Production entry smoke
        run: npm.cmd run smoke:production-entry

      - name: Package Windows directory
        run: npm.cmd run dist:win:dir

      - name: Verify packaged app
        run: npm.cmd run verify:packaged-app -- --platform win

      - name: Create Windows zip
        run: npm.cmd run zip:win

      - name: Verify Windows zip
        shell: pwsh
        run: |
          $version = node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version"
          npm.cmd run verify:release-zip -- "release\SuwolAudioReference-$version-win-x64.zip"

      - name: Check Windows release artifacts
        run: npm.cmd run check:release -- --platform win

      - name: Upload Windows zip
        uses: actions/upload-artifact@v5
        with:
          name: suwol-audio-reference-windows
          path: release/SuwolAudioReference-*-win-x64.zip
          if-no-files-found: error

  build-linux:
    name: Linux zip and AppImage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install Linux package prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip xvfb libnss3 libatk-bridge2.0-0 libgtk-3-0 libxss1
          sudo apt-get install -y libasound2t64 || sudo apt-get install -y libasound2

      - name: Install dependencies
        run: npm ci

      - name: Check release tag
        if: github.event_name != 'workflow_dispatch'
        run: npm run check:release-tag

      - name: Check workflow dispatch release tag
        if: github.event_name == 'workflow_dispatch'
        run: npm run check:release-tag -- --tag="${{ inputs.release_tag }}"

      - name: Typecheck
        run: npm run typecheck

      - name: Check i18n
        run: npm run check:i18n

      - name: Test
        run: npm test

      - name: Audit
        run: npm run audit

      - name: Build
        run: npm run build

      - name: Production entry smoke
        run: npm run smoke:production-entry

      - name: Package Linux directory
        run: npm run dist:linux:dir

      - name: Verify packaged app
        run: xvfb-run -a npm run verify:packaged-app -- --platform linux --no-sandbox
        env:
          ELECTRON_DISABLE_SANDBOX: "1"

      - name: Create Linux zip
        run: npm run zip:linux

      - name: Verify Linux zip
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          npm run verify:release-zip -- "release/SuwolAudioReference-${version}-linux-x64.zip"

      - name: Check Linux release artifacts
        run: npm run check:release -- --platform linux

      - name: Build Linux AppImage
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: npm run dist:linux:release

      - name: Normalize Linux AppImage
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: npm run normalize:linux-appimage

      - name: Create Linux release checksums
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          cp suwol-release-public-key.asc release/
          npm run checksums -- release

      - name: Import GPG private key for Linux checksums
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          export GNUPGHOME="${RUNNER_TEMP}/gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          echo "GPG_PRIVATE_KEY_B64 present: $([ -n "${GPG_PRIVATE_KEY_B64:-}" ] && echo yes || echo no)"
          echo "GPG_PRIVATE_KEY present: $([ -n "${GPG_PRIVATE_KEY:-}" ] && echo yes || echo no)"
          echo "GPG_PASSPHRASE present: $([ -n "${GPG_PASSPHRASE:-}" ] && echo yes || echo no)"
          if [ -n "${GPG_PRIVATE_KEY_B64:-}" ]; then
            printf '%s' "$GPG_PRIVATE_KEY_B64" | base64 --decode > "${RUNNER_TEMP}/suwol-release-private.asc"
          elif [ -n "${GPG_PRIVATE_KEY:-}" ]; then
            printf '%s' "$GPG_PRIVATE_KEY" > "${RUNNER_TEMP}/suwol-release-private.asc"
          else
            echo "GPG_PRIVATE_KEY_B64 or GPG_PRIVATE_KEY is required" >&2
            exit 1
          fi
          test -n "${GPG_PASSPHRASE:-}"
          gpg --batch --import "${RUNNER_TEMP}/suwol-release-private.asc"
          rm -f "${RUNNER_TEMP}/suwol-release-private.asc"
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
        env:
          GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Sign Linux release checksums
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          cd release
          VERSION="$(node -p "JSON.parse(require('fs').readFileSync('../package.json', 'utf8')).version")"
          printf '%s' "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback \
            --passphrase-fd 0 \
            --armor --detach-sign --output checksums.txt.asc checksums.txt
          cp checksums.txt.asc "SuwolAudioReference-${VERSION}-checksums.txt.asc"
          test -s checksums.txt.asc
          test -s "SuwolAudioReference-${VERSION}-checksums.txt.asc"
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Verify Linux release signature and checksums
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          cd release
          VERSION="$(node -p "JSON.parse(require('fs').readFileSync('../package.json', 'utf8')).version")"
          gpg --import suwol-release-public-key.asc
          gpg --verify checksums.txt.asc checksums.txt
          gpg --verify "SuwolAudioReference-${VERSION}-checksums.txt.asc" "SuwolAudioReference-${VERSION}-checksums.txt"
          cd ..
          npm run verify:checksums -- release --require-signature

      - name: Check Linux updater artifacts
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: npm run check:linux-updater -- release --require-signature

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v5
        with:
          name: suwol-audio-reference-linux
          path: |
            release/SuwolAudioReference-*-linux-x64.zip
            release/SuwolAudioReference-*-linux-x64.AppImage
            release/latest-linux.yml
            release/*.blockmap
            release/checksums.txt
            release/checksums.txt.asc
            release/SuwolAudioReference-*-checksums.txt
            release/SuwolAudioReference-*-checksums.txt.asc
            release/suwol-release-public-key.asc
          if-no-files-found: error

  build-macos:
    name: macOS signed artifacts
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Check release tag
        if: github.event_name != 'workflow_dispatch'
        run: npm run check:release-tag

      - name: Check workflow dispatch release tag
        if: github.event_name == 'workflow_dispatch'
        run: npm run check:release-tag -- --tag="${{ inputs.release_tag }}"

      - name: Verify macOS signing inputs
        shell: bash
        run: |
          set -euo pipefail
          for name in APPLE_ID APPLE_TEAM_ID APPLE_APP_SPECIFIC_PASSWORD CSC_LINK CSC_KEY_PASSWORD MAC_KEYCHAIN_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for macOS release signing"
              exit 1
            fi
            echo "$name present: yes"
          done
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          MAC_KEYCHAIN_PASSWORD: ${{ secrets.MAC_KEYCHAIN_PASSWORD }}

      - name: Unlock temporary keychain
        shell: bash
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="${RUNNER_TEMP}/suwol-release.keychain-db"
          CERT_PATH="${RUNNER_TEMP}/suwol-macos-cert.p12"
          security create-keychain -p "${MAC_KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${MAC_KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}" $(security list-keychains -d user | sed 's/"//g')
          printf '%s' "${CSC_LINK}" | base64 --decode > "${CERT_PATH}"
          security import "${CERT_PATH}" -k "${KEYCHAIN_PATH}" -P "${CSC_KEY_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
          rm -f "${CERT_PATH}"
          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "$GITHUB_ENV"
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          MAC_KEYCHAIN_PASSWORD: ${{ secrets.MAC_KEYCHAIN_PASSWORD }}

      - name: Verify notarization tools
        shell: bash
        run: |
          set -euo pipefail
          xcrun -find stapler
          xcrun -find notarytool
          xcrun notarytool --version
          security find-identity -v -p codesigning

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Check i18n
        run: npm run check:i18n

      - name: Test
        run: npm test

      - name: Audit
        run: npm run audit

      - name: Build
        run: npm run build

      - name: Build macOS DMG and ZIP
        run: npm run dist:mac:release
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_KEYCHAIN: ${{ env.KEYCHAIN_PATH }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Verify app signature
        run: npm run verify:packaged-app -- --platform mac --verify-signature

      - name: Normalize macOS artifacts
        run: npm run normalize:macos

      - name: Notarize and staple DMG
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          DMG_PATH="release/SuwolAudioReference-${VERSION}-mac-arm64.dmg"
          test -s "$DMG_PATH"
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v5
        with:
          name: suwol-audio-reference-macos
          path: |
            release/SuwolAudioReference-*-mac-arm64.dmg
            release/SuwolAudioReference-*-mac-arm64.zip
            release/latest-mac.yml
          if-no-files-found: error

  publish-release:
    name: GitHub Release
    needs:
      - build-windows
      - build-linux
      - build-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Print downloaded files
        run: find . -maxdepth 6 -type f -print

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ inputs.release_tag }}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi
          if [ -z "$RELEASE_TAG" ]; then
            echo "release_tag is required"
            exit 1
          fi
          case "$RELEASE_TAG" in
            v*) ;;
            *)
              echo "release_tag must be a version tag like v0.1.4"
              exit 1
              ;;
          esac
          VERSION="${RELEASE_TAG#v}"
          PACKAGE_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $VERSION does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi
          RELEASE_NOTES_FILE="docs/release-notes-${VERSION}.md"
          test -s "$RELEASE_NOTES_FILE"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "notes=$RELEASE_NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Stage release assets
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.release.outputs.version }}"
          mkdir -p release-assets
          copy_asset() {
            local name="$1"
            local source
            source="$(find artifacts -type f -name "$name" -print -quit)"
            if [ -z "$source" ]; then
              echo "Missing release asset: $name" >&2
              exit 1
            fi
            cp "$source" "release-assets/$name"
          }
          copy_asset "SuwolAudioReference-${VERSION}-win-x64.zip"
          copy_asset "SuwolAudioReference-${VERSION}-linux-x64.zip"
          copy_asset "SuwolAudioReference-${VERSION}-linux-x64.AppImage"
          copy_asset "latest-linux.yml"
          copy_asset "SuwolAudioReference-${VERSION}-mac-arm64.dmg"
          copy_asset "SuwolAudioReference-${VERSION}-mac-arm64.zip"
          copy_asset "latest-mac.yml"
          cp suwol-release-public-key.asc release-assets/
          find release-assets -maxdepth 1 -type f -print | sort

      - name: Verify staged release assets
        run: npm run verify:release-assets -- release-assets

      - name: Create checksums
        run: npm run checksums -- release-assets --require-all

      - name: Import GPG private key
        shell: bash
        run: |
          set -euo pipefail
          export GNUPGHOME="${RUNNER_TEMP}/gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          echo "GPG_PRIVATE_KEY_B64 present: $([ -n "${GPG_PRIVATE_KEY_B64:-}" ] && echo yes || echo no)"
          echo "GPG_PRIVATE_KEY present: $([ -n "${GPG_PRIVATE_KEY:-}" ] && echo yes || echo no)"
          echo "GPG_PASSPHRASE present: $([ -n "${GPG_PASSPHRASE:-}" ] && echo yes || echo no)"
          if [ -n "${GPG_PRIVATE_KEY_B64:-}" ]; then
            printf '%s' "$GPG_PRIVATE_KEY_B64" | base64 --decode > "${RUNNER_TEMP}/suwol-release-private.asc"
          elif [ -n "${GPG_PRIVATE_KEY:-}" ]; then
            printf '%s' "$GPG_PRIVATE_KEY" > "${RUNNER_TEMP}/suwol-release-private.asc"
          else
            echo "GPG_PRIVATE_KEY_B64 or GPG_PRIVATE_KEY is required" >&2
            exit 1
          fi
          test -n "${GPG_PASSPHRASE:-}"
          gpg --batch --import "${RUNNER_TEMP}/suwol-release-private.asc"
          rm -f "${RUNNER_TEMP}/suwol-release-private.asc"
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
        env:
          GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Sign checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          VERSION="${{ steps.release.outputs.version }}"
          printf '%s' "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback \
            --passphrase-fd 0 \
            --armor --detach-sign --output checksums.txt.asc checksums.txt
          cp checksums.txt.asc "SuwolAudioReference-${VERSION}-checksums.txt.asc"
          test -s checksums.txt.asc
          test -s "SuwolAudioReference-${VERSION}-checksums.txt.asc"
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Verify checksums and signatures
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          VERSION="${{ steps.release.outputs.version }}"
          gpg --import suwol-release-public-key.asc
          gpg --verify checksums.txt.asc checksums.txt
          gpg --verify "SuwolAudioReference-${VERSION}-checksums.txt.asc" "SuwolAudioReference-${VERSION}-checksums.txt"
          cd ..
          npm run verify:checksums -- release-assets --require-all --require-signature
          npm run verify:release-assets -- release-assets --require-all

      - name: Create or update GitHub release
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ steps.release.outputs.tag }}"
          RELEASE_NOTES_FILE="${{ steps.release.outputs.notes }}"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --title "Suwol Audio Reference $RELEASE_TAG" \
              --notes-file "$RELEASE_NOTES_FILE"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
